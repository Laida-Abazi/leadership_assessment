substitutions:
  _REGION: europe-west4
  _SERVICE_NAME: leadership-assessment
  _ARTIFACT_REPO: cloud-run-source-deploy

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build the container image (context = repo root)
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/leadership_assessment/leadership-assessment:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/leadership_assessment/leadership-assessment:latest
      - .
    dir: .

  # Push to Artifact Registry (versioned tag)
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/leadership_assessment/leadership-assessment:${SHORT_SHA}
    waitFor: [build]

  # Push the "latest" tag
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/leadership_assessment/leadership-assessment:latest
    waitFor: [build]

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/leadership_assessment/leadership-assessment:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
    waitFor: [push]

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/leadership_assessment/leadership-assessment:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/leadership_assessment/leadership-assessment:latest
