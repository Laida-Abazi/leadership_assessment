steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest'
      - '--set-env-vars=GEMINI_LIVE_MODEL=${_GEMINI_LIVE_MODEL},GEMINI_LIVE_VOICE=${_GEMINI_LIVE_VOICE}'

substitutions:
  _SERVICE: leadership-assessment
  _REGION: us-central1
  _REPO: leadership-assessment
  _GEMINI_LIVE_MODEL: gemini-2.5-flash-native-audio-preview-12-2025
  _GEMINI_LIVE_VOICE: Charon

options:
  logging: CLOUD_LOGGING_ONLY
