<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Leadership Assessment</title>
  <style>
    :root { --bg:#0f0f12; --surface:#1a1a1f; --border:#2d2d35; --text:#e8e6e3; --muted:#8b8685; --accent:#7c9cff; --danger:#e07c7c; --ok:#7cc97c; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--text); font-family:Inter,system-ui,sans-serif; padding:1rem; }
    main { width:100%; max-width:460px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.5rem; }
    h1 { margin:0 0 .35rem; font-size:1.35rem; }
    p { margin:.2rem 0 1rem; color:var(--muted); }
    label { display:block; margin:.7rem 0 .35rem; font-size:.88rem; color:var(--muted); }
    input { width:100%; padding:.7rem .8rem; border-radius:8px; border:1px solid var(--border); background:#222228; color:var(--text); }
    .row { display:flex; gap:.7rem; }
    .row > div { flex:1; }
    button { margin-top:1rem; width:100%; padding:.75rem; border:0; border-radius:8px; background:var(--accent); color:#0f0f12; font-weight:600; cursor:pointer; }
    .msg { margin-top:.9rem; min-height:1.4rem; font-size:.88rem; }
    .error { color:var(--danger); }
    .ok { color:var(--ok); }
    .foot { margin-top:1rem; font-size:.9rem; color:var(--muted); }
    a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <main>
    <h1>Create account</h1>
    <p>Sign up to access protected app features.</p>
    <form id="signupForm" autocomplete="off">
      <div class="row">
        <div>
          <label for="name">Name</label>
          <input id="name" type="text" required autocomplete="off">
        </div>
        <div>
          <label for="surname">Surname</label>
          <input id="surname" type="text" required autocomplete="off">
        </div>
      </div>
      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="off">
      <label for="password">Password</label>
      <input id="password" type="password" minlength="8" required autocomplete="new-password">
      <button type="submit" id="submitBtn">Sign Up</button>
    </form>
    <div id="msg" class="msg"></div>
    <div class="foot">Already have an account? <a id="loginLink" href="/auth/login">Sign in</a></div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "/test/pipeline";
    document.getElementById("loginLink").href = "/auth/login?next=" + encodeURIComponent(next);

    function showMessage(text, cls) {
      const msg = document.getElementById("msg");
      msg.textContent = text;
      msg.className = "msg " + cls;
    }

    function clearForeignStorageKeys() {
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith("stayguide_")) keysToRemove.push(key);
      }
      keysToRemove.forEach((key) => localStorage.removeItem(key));
    }

    clearForeignStorageKeys();
    document.getElementById("name").value = "";
    document.getElementById("surname").value = "";
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      showMessage("Creating account...", "ok");
      try {
        const res = await fetch("/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("name").value.trim(),
            surname: document.getElementById("surname").value.trim(),
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || "Sign up failed.");
        showMessage(data.message || "Account created. Please verify your email, then login.", "ok");
      } catch (err) {
        showMessage(err.message || "Sign up failed.", "error");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
