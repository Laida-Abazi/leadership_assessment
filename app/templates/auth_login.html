<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Leadership Assessment</title>
  <style>
    :root { --bg:#0f0f12; --surface:#1a1a1f; --border:#2d2d35; --text:#e8e6e3; --muted:#8b8685; --accent:#7c9cff; --danger:#e07c7c; --ok:#7cc97c; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--text); font-family:Inter,system-ui,sans-serif; padding:1rem; }
    main { width:100%; max-width:420px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.5rem; }
    h1 { margin:0 0 .35rem; font-size:1.35rem; }
    p { margin:.2rem 0 1rem; color:var(--muted); }
    label { display:block; margin:.7rem 0 .35rem; font-size:.88rem; color:var(--muted); }
    input { width:100%; padding:.7rem .8rem; border-radius:8px; border:1px solid var(--border); background:#222228; color:var(--text); }
    button { margin-top:1rem; width:100%; padding:.75rem; border:0; border-radius:8px; background:var(--accent); color:#0f0f12; font-weight:600; cursor:pointer; }
    .msg { margin-top:.9rem; min-height:1.4rem; font-size:.88rem; }
    .error { color:var(--danger); }
    .ok { color:var(--ok); }
    .foot { margin-top:1rem; font-size:.9rem; color:var(--muted); }
    a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <main>
    <h1>Login</h1>
    <p>Sign in to continue to the app.</p>
    <form id="loginForm" autocomplete="off">
      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="off">
      <label for="password">Password</label>
      <input id="password" type="password" required autocomplete="new-password">
      <button type="submit" id="submitBtn">Sign In</button>
    </form>
    <div id="msg" class="msg"></div>
    <div class="foot">No account yet? <a id="signupLink" href="/auth/signup">Create one</a></div>
  </main>
  <script>
    const ACCESS_TOKEN_KEY = "access_token";
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "/test/pipeline";
    document.getElementById("signupLink").href = "/auth/signup?next=" + encodeURIComponent(next);

    function showMessage(text, cls) {
      const msg = document.getElementById("msg");
      msg.textContent = text;
      msg.className = "msg " + cls;
    }

    function clearForeignStorageKeys() {
      const keysToRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith("stayguide_")) keysToRemove.push(key);
      }
      keysToRemove.forEach((key) => localStorage.removeItem(key));
    }

    function getTokenPayload(token) {
      try {
        const payload = token.split(".")[1];
        return JSON.parse(atob(payload.replace(/-/g, "+").replace(/_/g, "/")));
      } catch (_) {
        return null;
      }
    }

    function isTokenValid(token) {
      if (!token) return false;
      const payload = getTokenPayload(token);
      if (!payload || !payload.exp) return false;
      return (payload.exp * 1000) > Date.now();
    }

    clearForeignStorageKeys();
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";

    const existing = localStorage.getItem(ACCESS_TOKEN_KEY);
    if (isTokenValid(existing)) {
      window.location.replace(next);
    } else if (existing) {
      localStorage.removeItem(ACCESS_TOKEN_KEY);
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      showMessage("Signing in...", "ok");
      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || "Login failed.");
        localStorage.setItem(ACCESS_TOKEN_KEY, data.token.token);
        window.location.replace(next);
      } catch (err) {
        showMessage(err.message || "Login failed.", "error");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
